<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <title>youtube page</title>
    <style>
    body {
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      padding: 40px;
    }

    .card {
      width: 300px;
      background: #fff;
      border-radius: 10px;
      padding: 10px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    .item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      font-size: 18px;
      color: #222;
    }

    .item + .item {
      border-top: 1px solid #eee;
    }

    .badge {
      background: #3b82f6; /* blue */
      color: #fff;
      border-radius: 999px;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="item">
      <span>Home</span>
      <span class="badge">14</span>
    </div>
    <div class="item">
      <span>Notifications</span>
      <span class="badge">3</span>
    </div>
    <div class="item">
      <span>Messages</span>
      <span class="badge">5</span>
    </div>
  </div>

</body>
</html>
