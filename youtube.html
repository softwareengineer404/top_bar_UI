<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport", content="width=device-width", initial-scale="1.0>"
  <title>Top Bar UI</title>
  <style>
    body {
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      padding: 40px;
    }

    .navbar {
      max-width: 900px;
      margin: 0 auto;
      background: #7357b8; /* purple */
      border-radius: 8px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .nav-home {
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      white-space: nowrap;
    }

    .search-box {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .search-box input {
      width: 100%;
      max-width: 420px;
      border: none;
      outline: none;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      background: #fff;
    }

    .download-btn {
      color: #fff;
      border: 2px solid #fff;
      background: transparent;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .download-btn:hover {
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>

  <div class="navbar">
    <div class="nav-home">Home</div>

    <div class="search-box">
      <input type="text" placeholder="Search" />
    </div>

    <button class="download-btn">Download</button>
  </div>

</body>
</html>
